<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aura</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
 
  <!-- ==================== DESKTOP LAYOUT ==================== -->
  <div class="desktop-layout">
    <div class="desktop-top-buttons">
      <a href="https://aura-15.gitbook.io/transactions-and-shreads/shreds-delivery" target="_blank" rel="noopener noreferrer" class="desktop-btn-wide">
        <img src="assets/desktop/desctop_btn_shred.svg" alt="Shredstream">
      </a>
      <a href="https://aura-15.gitbook.io/transactions-and-shreads/transaction-submission" target="_blank" rel="noopener noreferrer" class="desktop-btn-wide">
        <img src="assets/desktop/desctop_btn_transaction.svg" alt="Transaction Sending">
      </a>
    </div>
 
    <div class="desktop-logo">
      <img src="assets/logo.svg" alt="Aura">
    </div>
 
    <div class="desktop-bottom">
      <div class="desktop-bottom-buttons">
        <a href="https://t.me/trade_with_aura#" target="_blank" rel="noopener noreferrer" class="desktop-btn-small">
          <img src="assets/desktop/desctop_btn_telegram.svg" alt="Telegram">
        </a>
        <a href="https://t.me/trade_with_aura_bot" target="_blank" rel="noopener noreferrer" class="desktop-btn-small">
          <img src="assets/desktop/desctop_btn_bot.svg" alt="Bot">
        </a>
        <a href="https://aura-15.gitbook.io/aura-user-manual" target="_blank" rel="noopener noreferrer" class="desktop-btn-small">
          <img src="assets/desktop/desctop_btn_manual.svg" alt="Manual">
        </a>
        <a href="https://x.com/trade_with_aura" target="_blank" rel="noopener noreferrer" class="desktop-btn-small">
          <img src="assets/desktop/desctop_btn_x.svg" alt="X">
        </a>
      </div>
      <div class="desktop-writing">
        <img src="assets/desktop/desctop_writing.svg" alt="In Aura We Trade">
      </div>
    </div>
  </div>
 
  <!-- ==================== TABLET LAYOUT ==================== -->
  <div class="tablet-layout">
    <div class="tablet-logo">
      <img src="assets/logo.svg" alt="Aura">
    </div>
 
    <div class="tablet-buttons">
      <div class="tablet-btn-row tablet-btn-row-pair">
        <a href="https://t.me/trade_with_aura_bot" target="_blank" rel="noopener noreferrer" class="tablet-btn-small">
          <img src="assets/tablet/tablet_btn_bot.svg" alt="Bot">
        </a>
        <a href="https://aura-15.gitbook.io/aura-user-manual" target="_blank" rel="noopener noreferrer" class="tablet-btn-small">
          <img src="assets/tablet/tablet_btn_manual.svg" alt="Manual">
        </a>
      </div>
      <div class="tablet-btn-row tablet-btn-row-pair">
        <a href="https://t.me/trade_with_aura#" target="_blank" rel="noopener noreferrer" class="tablet-btn-small">
          <img src="assets/tablet/tablet_btn_telegram.svg" alt="Telegram">
        </a>
        <a href="https://x.com/trade_with_aura" target="_blank" rel="noopener noreferrer" class="tablet-btn-small">
          <img src="assets/tablet/tablet_btn_x.svg" alt="X">
        </a>
      </div>
      <div class="tablet-btn-row">
        <a href="https://aura-15.gitbook.io/transactions-and-shreads/shreds-delivery" target="_blank" rel="noopener noreferrer" class="tablet-btn-wide">
          <img src="assets/tablet/tablet_btn_shred.svg" alt="Shredstream">
        </a>
      </div>
      <div class="tablet-btn-row">
        <a href="https://aura-15.gitbook.io/transactions-and-shreads/transaction-submission" target="_blank" rel="noopener noreferrer" class="tablet-btn-wide">
          <img src="assets/tablet/tablet_btn_transaction.svg" alt="Transaction Sending">
        </a>
      </div>
    </div>
 
    <div class="tablet-writing">
      <img src="assets/tablet/tablet_writing.svg" alt="In Aura We Trade">
    </div>
  </div>
 
  <!-- ==================== MOBILE LAYOUT ==================== -->
  <div class="mobile-layout">
    <div class="mobile-logo">
      <img src="assets/logo.svg" alt="Aura">
    </div>
 
    <div class="mobile-buttons">
      <div class="mobile-btn-row mobile-btn-row-pair">
        <a href="https://t.me/trade_with_aura_bot" target="_blank" rel="noopener noreferrer" class="mobile-btn-small">
          <img src="assets/mobile/mobile_btn_bot.svg" alt="Bot">
        </a>
        <a href="https://aura-15.gitbook.io/aura-user-manual" target="_blank" rel="noopener noreferrer" class="mobile-btn-small">
          <img src="assets/mobile/mobile_btn_manual.svg" alt="Manual">
        </a>
      </div>
      <div class="mobile-btn-row mobile-btn-row-pair">
        <a href="https://t.me/trade_with_aura#" target="_blank" rel="noopener noreferrer" class="mobile-btn-small">
          <img src="assets/mobile/mobile_btn_telegram.svg" alt="Telegram">
        </a>
        <a href="https://x.com/trade_with_aura" target="_blank" rel="noopener noreferrer" class="mobile-btn-small">
          <img src="assets/mobile/mobile_btn_x.svg" alt="X">
        </a>
      </div>
      <div class="mobile-btn-row">
        <a href="https://aura-15.gitbook.io/transactions-and-shreads/shreds-delivery" target="_blank" rel="noopener noreferrer" class="mobile-btn-wide">
          <img src="assets/mobile/mobile_btn_shred.svg" alt="Shredstream">
        </a>
      </div>
      <div class="mobile-btn-row">
        <a href="https://aura-15.gitbook.io/transactions-and-shreads/transaction-submission" target="_blank" rel="noopener noreferrer" class="mobile-btn-wide">
          <img src="assets/mobile/mobile_btn_sending.svg" alt="Transaction Sending">
        </a>
      </div>
    </div>
 
    <div class="mobile-writing">
      <img src="assets/mobile/mobile_writing.svg" alt="In Aura We Trade">
    </div>
  </div>
 
  <script src="script.js"></script>
</body>
</html>
// Prevent page scroll on mobile devices
document.addEventListener('touchmove', function(e) {
  e.preventDefault();
}, { passive: false });
