
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Aura</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
 
  <!-- DESKTOP -->
  <div class="layout desktop">
    <div class="dt-top-buttons">
      <a href="https://aura-15.gitbook.io/transactions-and-shreads/shreds-delivery" target="_blank" rel="noopener noreferrer"><img src="assets/desktop/desctop_btn_shred.svg" alt="Shredstream"></a>
      <a href="https://aura-15.gitbook.io/transactions-and-shreads/transaction-submission" target="_blank" rel="noopener noreferrer"><img src="assets/desktop/desctop_btn_transaction.svg" alt="Transaction Sending"></a>
    </div>
    <div class="dt-logo"><img src="assets/logo.svg" alt="Aura"></div>
    <div class="dt-bottom">
      <div class="dt-bottom-buttons">
        <a href="https://t.me/trade_with_aura#" target="_blank" rel="noopener noreferrer"><img src="assets/desktop/desctop_btn_telegram.svg" alt="Telegram"></a>
        <a href="https://t.me/trade_with_aura_bot" target="_blank" rel="noopener noreferrer"><img src="assets/desktop/desctop_btn_bot.svg" alt="Bot"></a>
        <a href="https://aura-15.gitbook.io/aura-user-manual" target="_blank" rel="noopener noreferrer"><img src="assets/desktop/desctop_btn_manual.svg" alt="Manual"></a>
        <a href="https://x.com/trade_with_aura" target="_blank" rel="noopener noreferrer"><img src="assets/desktop/desctop_btn_x.svg" alt="X"></a>
      </div>
      <div class="dt-writing"><img src="assets/desktop/desctop_writing.svg" alt="In Aura We Trade"></div>
    </div>
  </div>
 
  <!-- TABLET -->
  <div class="layout tablet">
    <div class="tb-logo"><img src="assets/logo.svg" alt="Aura"></div>
    <div class="tb-buttons">
      <div class="tb-row tb-pair">
        <a href="https://t.me/trade_with_aura_bot" target="_blank" rel="noopener noreferrer"><img src="assets/tablet/tablet_btn_bot.svg" alt="Bot"></a>
        <a href="https://aura-15.gitbook.io/aura-user-manual" target="_blank" rel="noopener noreferrer"><img src="assets/tablet/tablet_btn_manual.svg" alt="Manual"></a>
      </div>
      <div class="tb-row tb-pair">
        <a href="https://t.me/trade_with_aura#" target="_blank" rel="noopener noreferrer"><img src="assets/tablet/tablet_btn_telegram.svg" alt="Telegram"></a>
        <a href="https://x.com/trade_with_aura" target="_blank" rel="noopener noreferrer"><img src="assets/tablet/tablet_btn_x.svg" alt="X"></a>
      </div>
      <div class="tb-row"><a href="https://aura-15.gitbook.io/transactions-and-shreads/shreds-delivery" target="_blank" rel="noopener noreferrer"><img src="assets/tablet/tablet_btn_shred.svg" alt="Shredstream"></a></div>
      <div class="tb-row"><a href="https://aura-15.gitbook.io/transactions-and-shreads/transaction-submission" target="_blank" rel="noopener noreferrer"><img src="assets/tablet/tablet_btn_transaction.svg" alt="Transaction Sending"></a></div>
    </div>
    <div class="tb-writing"><img src="assets/tablet/tablet_writing.svg" alt="In Aura We Trade"></div>
  </div>
 
  <!-- MOBILE -->
  <div class="layout mobile">
    <div class="mb-logo"><img src="assets/logo.svg" alt="Aura"></div>
    <div class="mb-buttons">
      <div class="mb-row mb-pair">
        <a href="https://t.me/trade_with_aura_bot" target="_blank" rel="noopener noreferrer"><img src="assets/mobile/mobile_btn_bot.svg" alt="Bot"></a>
        <a href="https://aura-15.gitbook.io/aura-user-manual" target="_blank" rel="noopener noreferrer"><img src="assets/mobile/mobile_btn_manual.svg" alt="Manual"></a>
      </div>
      <div class="mb-row mb-pair">
        <a href="https://t.me/trade_with_aura#" target="_blank" rel="noopener noreferrer"><img src="assets/mobile/mobile_btn_telegram.svg" alt="Telegram"></a>
        <a href="https://x.com/trade_with_aura" target="_blank" rel="noopener noreferrer"><img src="assets/mobile/mobile_btn_x.svg" alt="X"></a>
      </div>
      <div class="mb-row"><a href="https://aura-15.gitbook.io/transactions-and-shreads/shreds-delivery" target="_blank" rel="noopener noreferrer"><img src="assets/mobile/mobile_btn_shred.svg" alt="Shredstream"></a></div>
      <div class="mb-row"><a href="https://aura-15.gitbook.io/transactions-and-shreads/transaction-submission" target="_blank" rel="noopener noreferrer"><img src="assets/mobile/mobile_btn_transaction.svg" alt="Transaction Sending"></a></div>
    </div>
    <div class="mb-writing"><img src="assets/mobile/mobile_writing.svg" alt="In Aura We Trade"></div>
  </div>
 
  <script src="script.js"></script>
</body>
</html>
