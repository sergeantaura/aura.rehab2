<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aura</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="viewport">
      <main class="frame" aria-label="Aura one-page website">
        <img class="logo" src="assets/logo.svg" alt="Aura logo" />

        <a class="btn btn-shred" href="https://aura-15.gitbook.io/transactions-and-shreads/shreds-delivery" target="_blank" rel="noopener noreferrer" aria-label="Open Shredstream"><picture><source media="(max-width: 767px)" srcset="assets/mobile/mobile_btn_shred.svg" /><source media="(max-width: 1024px)" srcset="assets/tablet/tablet_btn_shred.svg" /><img src="assets/desktop/desctop_btn_shred.svg" alt="" /></picture></a>
        <a class="btn btn-transaction" href="https://aura-15.gitbook.io/transactions-and-shreads/transaction-submission" target="_blank" rel="noopener noreferrer" aria-label="Open Transaction Submission"><picture><source media="(max-width: 767px)" srcset="assets/mobile/mobile_btn_transaction.svg" /><source media="(max-width: 1024px)" srcset="assets/tablet/tablet_btn_transaction.svg" /><img src="assets/desktop/desctop_btn_transaction.svg" alt="" /></picture></a>
        <a class="btn btn-telegram" href="https://t.me/trade_with_aura#" target="_blank" rel="noopener noreferrer" aria-label="Open Telegram"><picture><source media="(max-width: 767px)" srcset="assets/mobile/mobile_btn_telegram.svg" /><source media="(max-width: 1024px)" srcset="assets/tablet/tablet_btn_telegram.svg" /><img src="assets/desktop/desctop_btn_telegram.svg" alt="" /></picture></a>
        <a class="btn btn-bot" href="https://t.me/trade_with_aura_bot" target="_blank" rel="noopener noreferrer" aria-label="Open Bot"><picture><source media="(max-width: 767px)" srcset="assets/mobile/mobile_btn_bot.svg" /><source media="(max-width: 1024px)" srcset="assets/tablet/tablet_btn_bot.svg" /><img src="assets/desktop/desctop_btn_bot.svg" alt="" /></picture></a>
        <a class="btn btn-manual" href="https://aura-15.gitbook.io/aura-user-manual" target="_blank" rel="noopener noreferrer" aria-label="Open Manual"><picture><source media="(max-width: 767px)" srcset="assets/mobile/mobile_btn_manual.svg" /><source media="(max-width: 1024px)" srcset="assets/tablet/tablet_btn_manual.svg" /><img src="assets/desktop/desctop_btn_manual.svg" alt="" /></picture></a>
        <a class="btn btn-x" href="https://x.com/trade_with_aura" target="_blank" rel="noopener noreferrer" aria-label="Open X"><picture><source media="(max-width: 767px)" srcset="assets/mobile/mobile_btn_x.svg" /><source media="(max-width: 1024px)" srcset="assets/tablet/tablet_btn_x.svg" /><img src="assets/desktop/desctop_btn_x.svg" alt="" /></picture></a>

        <picture class="writing"><source media="(max-width: 767px)" srcset="assets/mobile/mobile_writing.svg" /><source media="(max-width: 1024px)" srcset="assets/tablet/tablet_writing.svg" /><img src="assets/desktop/desctop_writing.svg" alt="In Aura We Trade" /></picture>
      </main>
    </div>

    <script src="script.js" defer></script>
  </body>
</html>
